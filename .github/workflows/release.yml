name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog
        id: extract
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          BODY=$(awk -v tag="$TAG" '
            /^## \[/ { if (found) exit; if (index($0, tag)) found=1; next }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Use GitHub Actions multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PB_BASE_URL: ${{ vars.PB_BASE_URL }}
          DEPLOY_API_BASE_URL: ${{ vars.DEPLOY_API_BASE_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Swritor ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
